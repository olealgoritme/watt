<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#ffab00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="2" y="2" width="396" height="136" rx="20" ry="20" fill="#0d1117" stroke="#1c2333" stroke-width="2"/>

  <!-- Lightning bolt -->
  <g filter="url(#glow)" transform="translate(40, 20)">
    <polygon points="48,0 18,52 38,52 28,92 68,36 46,36 58,0"
             fill="url(#bolt-grad)" stroke="none"/>
  </g>

  <!-- "watt" text -->
  <text x="155" y="82" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace"
        font-size="54" font-weight="700" fill="#e6edf3" letter-spacing="4">
    watt
  </text>

  <!-- Subtle tagline -->
  <text x="140" y="108" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace"
        font-size="11" fill="#7d8590" letter-spacing="2">
    per-process power monitoring
  </text>
</svg>
